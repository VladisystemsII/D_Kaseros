<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Plato - MenuMaster</title>
  <meta name="description" content="Detalle completo del plato: foto, descripción y precio.">
  <meta property="og:title" content="Detalle del Plato - MenuMaster">
  <meta property="og:description" content="Información completa del plato en MenuMaster.">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- HEADER cargado dinámicamente desde modules/header.html -->
  <div id="header-container"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="detalle-container" id="detalleContainer">

    <nav class="breadcrumb">
      <a href="index.html">Inicio</a> &gt;
      <a href="menu.html">Menú</a> &gt;
      <span>Detalle del plato</span>
    </nav>

    <a href="menu.html" class="btn-volver">← Volver al menú</a>

    <!-- Indicador de carga -->
    <div class="mensaje-carga" id="mensajeCarga">
      <h2>Cargando información del plato...</h2>
      <div class="loading-box"
           style="position:static; transform:none; margin:20px auto;"></div>
    </div>

    <!-- Contenido (se llena con JS) -->
    <div id="contenidoPropiedad" style="display:none;">

      <!-- Galería -->
      <section class="galeria-section">
        <div class="foto-principal" id="fotoPrincipal">
          <img src="" alt="Foto principal del plato" id="imgPrincipal">
        </div>
        <div class="thumbnails" id="thumbnailsContainer"></div>
      </section>

      <!-- Grid de información -->
      <div class="info-grid">

        <div class="info-principal">
          <h1 id="propTitulo"></h1>

          <!-- Categoría del plato -->
          <div class="ubicacion">
            <span>🍽️</span>
            <span id="propUbicacion"></span>
          </div>

          <!-- Badge de disponibilidad -->
          <div class="tipo-badge" id="propTipo"></div>

          <!-- Características reales del plato (v1) -->
          <div class="caracteristicas">
            <div class="caracteristica-item">
              <span class="icono">🔢</span>
              <span class="valor" id="propArea">-</span>
              <span class="label">Orden</span>
            </div>
            <div class="caracteristica-item">
              <span class="icono">🏠</span>
              <span class="valor" id="propHabitaciones">-</span>
              <span class="label">Restaurante</span>
            </div>
            <div class="caracteristica-item">
              <span class="icono">🍽️</span>
              <span class="valor" id="propBanos">1</span>
              <span class="label">Porción</span>
            </div>
            <div class="caracteristica-item">
              <span class="icono">⭐</span>
              <span class="valor" id="propParqueaderos">-</span>
              <span class="label">Destacado</span>
            </div>
          </div>

          <div class="descripcion-section">
            <h3>Descripción del plato</h3>
            <p id="propDescripcion"></p>
          </div>
        </div>

        <!-- Sidebar de pedido -->
        <div class="sidebar-contacto">
          <div class="precio-principal" id="propPrecioVenta"></div>
          <span class="precio-label" id="propEstadoVenta"></span>

          <!-- Precio combo: oculto en v1 (no existe el campo aún) -->
          <div class="precio-secundario" id="precioArriendoBox" style="display:none;">
            <span class="label">Precio combo / porción extra</span>
            <span class="valor" id="propPrecioArriendo"></span>
          </div>

          <div class="detalle-extra">
            <div class="detalle-extra-item">
              <span class="label">Categoría:</span>
              <span class="valor" id="propEstrato">-</span>
            </div>
            <div class="detalle-extra-item">
              <span class="label">Alérgenos:</span>
              <span class="valor" id="propAdministracion">Consultar</span>
            </div>
            <div class="detalle-extra-item">
              <span class="label">Disponibilidad:</span>
              <span class="valor" id="propClasificacion">-</span>
            </div>
          </div>

          <button class="btn-whatsapp" id="btnWhatsapp">
            <span style="font-size:1.5rem;">📱</span>
            Pedir por WhatsApp
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER cargado dinámicamente desde modules/footer.html -->
  <div id="footer-container"></div>

  <!--
    SCRIPTS — Orden requerido:
    1. header-loader      → inyecta HTML del header
    2. header.js          → enlace activo
    3. footer-loader      → inyecta HTML del footer
    4. menu-mobile        → menú responsive
    5. config.js          → endpoints centralizados
    6. marked.js          → renderiza Markdown en descripción
    7. detalle-plato.js   → carga y renderiza detalle del plato
  -->
  <script src="js/header-loader.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer-loader.js"></script>
  <script src="js/menu-mobile.js"></script>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/detalle-plato.js"></script>

</body>
</html>
