<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Artículo - MenuMaster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artículo del blog gastronómico de MenuMaster. Recetas, tips y novedades de nuestra cocina.">
  <meta property="og:title" content="Artículo - MenuMaster">
  <meta property="og:description" content="Lee nuestros artículos sobre gastronomía y cocina casera colombiana.">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/articulo.css">
</head>
<body>

  <!-- HEADER cargado dinámicamente desde modules/header.html -->
  <div id="header-container"></div>

  <!-- INDICADOR DE CARGA -->
  <div id="loadingArticulo" class="loading-box" role="status" aria-live="polite"
       style="display:none;">
    <h2>Cargando artículo…</h2>
  </div>

  <!-- CONTENIDO DEL ARTÍCULO -->
  <main>
    <div class="article-container" id="articleContainer">
      <h1 class="article-title"  id="articleTitle"></h1>
      <p  class="article-date"   id="articleDate"></p>
      <p  class="article-resumen" id="articleResumen"></p>
      <hr class="article-divider">
      <div class="article-content" id="articleContent"></div>
      <a href="blog.html" class="btn-volver">← Volver al Blog</a>
    </div>
  </main>

  <!-- FOOTER cargado dinámicamente desde modules/footer.html -->
  <div id="footer-container"></div>

  <!--
    SCRIPTS — Orden requerido:
    1. header-loader → inyecta HTML del header
    2. header.js     → enlace activo
    3. footer-loader → inyecta HTML del footer
    4. menu-mobile   → menú responsive
    5. config.js     → endpoint centralizado
    6. marked.js     → renderiza Markdown
    7. articulo.js   → carga y renderiza el artículo
  -->
  <script src="js/header-loader.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer-loader.js"></script>
  <script src="js/menu-mobile.js"></script>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/articulo.js"></script>
</body>
</html>
